<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>STAMINA — Générateur de nom de bière</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ===============================
       FOND SOIR / BAR (CHAUD & SOMBRE)
       =============================== */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', Helvetica, Arial, sans-serif;
      color: #f2efe9;
      min-height: 100vh;
      overflow: hidden;

      background: linear-gradient(
        180deg,
        #1b1a17 0%,
        #2a241b 40%,
        #3a2f1d 100%
      );
      background-size: 100% 300%;
      animation: slowBackground 60s ease-in-out infinite;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes slowBackground {
      0%   { background-position: 50% 0%; }
      50%  { background-position: 50% 100%; }
      100% { background-position: 50% 0%; }
    }

    /* ===============================
       BULLES AMBRÉES (VISIBLE & ÉLÉGANT)
       =============================== */
    .bubbles {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      bottom: -200px;
      border-radius: 50%;
      opacity: 0.75;

      background: radial-gradient(
        circle at 30% 30%,
        rgba(255, 220, 150, 0.9),
        rgba(210, 150, 60, 0.35) 60%,
        rgba(120, 70, 20, 0.15)
      );

      animation-name: rise;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes rise {
      from {
        transform: translate(0, 0) scale(0.9);
      }
      to {
        transform: translate(var(--drift), -140vh) scale(1.1);
      }
    }

    /* Accélération subtile au clic */
    .bubbles.boost .bubble {
      animation-duration: calc(var(--duration) * 0.6);
    }

    /* ===============================
       CARTE CENTRALE (PREMIUM)
       =============================== */
    .container {
      position: relative;
      z-index: 2;

      background-color: rgba(25, 23, 18, 0.72);
      backdrop-filter: blur(8px);

      text-align: center;
      max-width: 560px;
      width: 100%;
      padding: 76px 60px;

      border-radius: 18px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.55);
    }

    .brand {
      font-size: 13px;
      color: #d6c49a;
      line-height: 1.5;
      margin-bottom: 42px;
    }

    .intro {
      font-size: 15px;
      color: #e4dfd2;
      max-width: 440px;
      margin: 0 auto 36px auto;
      line-height: 1.6;
    }

    /* TITRE SUR UNE SEULE LIGNE */
    h1 {
      font-size: 36px;
      font-weight: 600;
      margin: 0 0 46px 0;
      white-space: nowrap;
      text-align: center;
      color: #fff6dd;
    }

    button {
      background-color: #c8923a;
      color: #1b1a17;
      border: none;
      padding: 16px 46px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
    }

    #result {
      font-size: 40px;
      font-weight: 600;
      margin-top: 68px;
      letter-spacing: 0.05em;
      color: #ffe6b0;
    }

    .separator {
      width: 52px;
      height: 3px;
      background-color: #d9a93a;
      margin: 18px auto 38px;
    }

    .footer {
      font-size: 12px;
      color: #cbb88d;
      margin-top: 58px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 28px;
        white-space: normal;
      }
      .container {
        padding: 56px 32px;
      }
    }
  </style>
</head>

<body>

  <!-- BULLES -->
  <div class="bubbles" id="bubbles">
    <div class="bubble" style="left:8%;  width:32px; height:32px; --duration:26s; --drift:-30px; animation-duration:26s;"></div>
    <div class="bubble" style="left:22%; width:56px; height:56px; --duration:36s; --drift:40px;  animation-duration:36s;"></div>
    <div class="bubble" style="left:40%; width:24px; height:24px; --duration:22s; --drift:-20px; animation-duration:22s;"></div>
    <div class="bubble" style="left:58%; width:72px; height:72px; --duration:44s; --drift:60px;  animation-duration:44s;"></div>
    <div class="bubble" style="left:74%; width:38px; height:38px; --duration:30s; --drift:-35px; animation-duration:30s;"></div>
    <div class="bubble" style="left:90%; width:50px; height:50px; --duration:40s; --drift:25px;  animation-duration:40s;"></div>
  </div>

  <!-- CONTENU -->
  <div class="container">

    <div class="brand">
      <strong>STAMINA</strong><br>
      micro-brasserie artisanale<br>
      —
    </div>

    <p class="intro">
      Un outil STAMINA pour explorer le langage de la brasserie.
    </p>

    <h1>Génère ton nom de bière</h1>

    <button onclick="generateName()">Générer</button>

    <div id="result">—</div>
    <div class="separator"></div>

    <div class="footer">
      Un nom, un choix — STAMINA
    </div>

  </div>

  <script>
    function generateName() {
      const abstract = [
        "La Brume","Le Silence","La Lueur","L'Instant",
        "L'Horizon","La Saison","La Matière","La Ligne"
      ];

      const material = [
        ["Le Malt", ["Clair","Mat","Simple","Juste"]],
        ["La Fermentation", ["Lente","Calme","Maîtrisée"]],
        ["Le Houblon", ["Sec","Net","Précis"]],
        ["Le Brassin", ["Lent","Soigné"]],
        ["La Capsule", ["Sobre","Claire"]],
        ["La Cuve", ["Ouverte","Stabilisée"]]
      ];

      const editions = ["— Série Courte","— Variation","— Lot Unique"];

      let name = "";
      const roll = Math.random();

      if (roll < 0.45) {
        name = abstract[Math.floor(Math.random() * abstract.length)];
      } else if (roll < 0.85) {
        const base = material[Math.floor(Math.random() * material.length)];
        const adjective = base[1][Math.floor(Math.random() * base[1].length)];
        name = base[0] + " " + adjective;
      } else {
        const base = abstract[Math.floor(Math.random() * abstract.length)];
        const edition = editions[Math.floor(Math.random() * editions.length)];
        name = base + " " + edition;
      }

      document.getElementById("result").textContent = name;

      /* Réaction subtile au clic */
      const bubbles = document.getElementById("bubbles");
      bubbles.classList.add("boost");
      setTimeout(() => bubbles.classList.remove("boost"), 900);
    }
  </script>

</body>
</html
