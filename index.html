<script>
function generateName() {

  // STRUCTURE A — Noms abstraits (SEULS)
  const abstractNames = [
    "La Brume",
    "Le Silence",
    "La Lueur",
    "L’Instant",
    "L’Horizon",
    "La Saison"
  ];

  // STRUCTURE B — Noms bière (verrouillés et cohérents)
  const beerNames = [
    "Le Malt Clair",
    "Le Malt Mat",
    "Le Malt Simple",
    "La Fermentation Lente",
    "La Fermentation Calme",
    "Le Houblon Brut",
    "Le Houblon Libre",
    "Le Brassin Lent",
    "La Capsule Pure",
    "La Capsule Claire"
  ];

  let name = "";

  if (Math.random() < 0.5) {
    name = abstractNames[Math.floor(Math.random() * abstractNames.length)];
  } else {
    name = beerNames[Math.floor(Math.random() * beerNames.length)];
  }

  document.getElementById("result").textContent = name;
}
</script>
``
