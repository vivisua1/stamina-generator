<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>STAMINA — Générateur de nom de bière</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ===============================
       FOND ANIMÉ CONTRASTÉ
       =============================== */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', Helvetica, Arial, sans-serif;
      color: #222;
      min-height: 100vh;
      overflow: hidden;

      background: linear-gradient(
        180deg,
        #f6f5ef 0%,
        #ece9df 50%,
        #e2e8e1 100%
      );
      background-size: 100% 300%;
      animation: slowBackground 90s ease-in-out infinite;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes slowBackground {
      0% { background-position: 50% 0%; }
      50% { background-position: 50% 100%; }
      100% { background-position: 50% 0%; }
    }

    /* ===============================
       BULLES (ARRIÈRE-PLAN)
       =============================== */
    .bubbles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .bubble {
      position: absolute;
      bottom: -120px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      animation: rise linear infinite;
      filter: blur(0.5px);
    }

    @keyframes rise {
      from {
        transform: translateY(0);
        opacity: 0;
      }
      10% {
        opacity: 0.25;
      }
      to {
        transform: translateY(-120vh);
        opacity: 0;
      }
    }

    /* ===============================
       CARTE CENTRALE
       =============================== */
    .container {
      position: relative;
      z-index: 2;

      background-color: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(4px);

      text-align: center;
      max-width: 460px;
      width: 100%;
      padding: 64px 48px;

      border-radius: 10px;
    }

    .brand {
      font-size: 13px;
      color: #7a5c3e;
      line-height: 1.5;
      margin-bottom: 48px;
    }

    .intro {
      font-size: 14px;
      color: #444;
      max-width: 360px;
      margin: 0 auto 28px auto;
      line-height: 1.6;
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      line-height: 1.15;
      margin: 0 0 40px 0;
    }

    button {
      background-color: #5e7f68;
      color: #fff;
      border: none;
      padding: 14px 36px;
      font-size: 15px;
      font-weight: 500;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.9;
    }

    #result {
      font-size: 36px;
      font-weight: 600;
      margin-top: 56px;
      letter-spacing: 0.03em;
    }

    .separator {
      width: 40px;
      height: 2px;
      background-color: #e2b74b;
      margin: 14px auto 32px;
    }

    .footer {
      font-size: 11px;
      color: #7a5c3e;
      margin-top: 48px;
    }

    @media (min-width: 768px) {
      #result {
        font-size: 40px;
      }
    }
  </style>
</head>

<body>

  <!-- BULLES -->
  <div class="bubbles">
    <div class="bubble" style="left:10%; width:12px; height:12px; animation-duration:22s;"></div>
    <div class="bubble" style="left:20%; width:20px; height:20px; animation-duration:30s;"></div>
    <div class="bubble" style="left:35%; width:10px; height:10px; animation-duration:18s;"></div>
    <div class="bubble" style="left:50%; width:26px; height:26px; animation-duration:34s;"></div>
    <div class="bubble" style="left:65%; width:14px; height:14px; animation-duration:25s;"></div>
    <div class="bubble" style="left:80%; width:22px; height:22px; animation-duration:32s;"></div>
  </div>

  <!-- CONTENU -->
  <div class="container">

    <div class="brand">
      <strong>STAMINA</strong><br>
      micro-brasserie artisanale<br>
      —
    </div>

    <p class="intro">
      Un outil STAMINA pour explorer le langage de la brasserie.
    </p>

    <h1>
      Génère<br>
      ton nom<br>
      de bière
    </h1>

    <button onclick="generateName()">Générer</button>

    <div id="result">—</div>
    <div class="separator"></div>

    <div class="footer">
      Un nom, un choix — STAMINA
    </div>

  </div>

  <script>
    function generateName() {
      const abstract = [
        "La Brume","Le Silence","La Lueur","L'Instant",
        "L'Horizon","La Saison","La Matière","La Ligne"
      ];

      const material = [
        ["Le Malt", ["Clair","Mat","Simple","Juste"]],
        ["La Fermentation", ["Lente","Calme","Maîtrisée"]],
        ["Le Houblon", ["Sec","Net","Précis"]],
        ["Le Brassin", ["Lent","Soigné"]],
        ["La Capsule", ["Sobre","Claire"]],
        ["La Cuve", ["Ouverte","Stabilisée"]]
      ];

      const editions = ["— Série Courte","— Variation","— Lot Unique"];

      let name = "";
      const roll = Math.random();

      if (roll < 0.45) {
        name = abstract[Math.floor(Math.random() * abstract.length)];
      } else if (roll < 0.85) {
        const base = material[Math.floor(Math.random() * material.length)];
        const adjective = base[1][Math.floor(Math.random() * base[1].length)];
        name = base[0] + " " + adjective;
      } else {
        const base = abstract[Math.floor(Math.random() * abstract.length)];
        const edition = editions[Math.floor(Math.random() * editions.length)];
        name = base + " " + edition;
      }

      document.getElementById("result").textContent = name;
    }
  </script>

</body>
</html>
