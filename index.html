<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>STAMINA — Générateur de nom de bière</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font (IMPORTANT : vrais liens) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ===============================
       FOND CONTRASTÉ ANIMÉ (ASSUMÉ)
       =============================== */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', Helvetica, Arial, sans-serif;
      color: #1f1f1f;
      min-height: 100vh;
      overflow: hidden;

      background: linear-gradient(
        180deg,
        #f5f1e6 0%,
        #e8d8a8 45%,
        #c7d7c5 100%
      );
      background-size: 100% 300%;
      animation: slowBackground 45s ease-in-out infinite;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes slowBackground {
      0% { background-position: 50% 0%; }
      50% { background-position: 50% 100%; }
      100% { background-position: 50% 0%; }
    }

    /* ===============================
       BULLES STYLISÉES (TRÈS VISIBLES)
       =============================== */
    .bubbles {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      bottom: -200px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(
        circle at 30% 30%,
        rgba(255,255,255,0.9),
        rgba(255,255,255,0.15) 60%,
        rgba(255,255,255,0.05)
      );
      opacity: 0.6;
      animation: rise linear infinite;
    }

    @keyframes rise {
      from {
        transform: translateY(0) scale(0.9);
      }
      to {
        transform: translateY(-140vh) scale(1.1);
      }
    }

    /* ===============================
       CARTE CENTRALE
       =============================== */
    .container {
      position: relative;
      z-index: 2;

      background-color: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(8px);

      text-align: center;
      max-width: 540px;
      width: 100%;
      padding: 72px 56px;

      border-radius: 16px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.12);
    }

    .brand {
      font-size: 13px;
      color: #5f4a2f;
      line-height: 1.5;
      margin-bottom: 40px;
    }

    .intro {
      font-size: 15px;
      color: #333;
      max-width: 440px;
      margin: 0 auto 36px auto;
      line-height: 1.6;
    }

    /* ===== TITRE SUR UNE SEULE LIGNE ===== */
    h1 {
      font-size: 36px;
      font-weight: 600;
      margin: 0 0 44px 0;
      white-space: nowrap;
      text-align: center;
    }

    button {
      background-color: #4f6f5a;
      color: #fff;
      border: none;
      padding: 16px 44px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
    }

    #result {
      font-size: 40px;
      font-weight: 600;
      margin-top: 64px;
      letter-spacing: 0.04em;
    }

    .separator {
      width: 48px;
      height: 3px;
      background-color: #d9a93a;
      margin: 18px auto 36px;
    }

    .footer {
      font-size: 12px;
      color: #5f4a2f;
      margin-top: 56px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 28px;
        white-space: normal;
      }
      .container {
        padding: 56px 32px;
      }
    }
  </style>
</head>

<body>

  <!-- BULLES -->
  <div class="bubbles">
    <div class="bubble" style="left:10%; animation-duration:22s;"></div>
    <div class="bubble" style="left:25%; animation-duration:28s; width:60px; height:60px;"></div>
    <div class="bubble" style="left:45%; animation-duration:20s; width:30px; height:30px;"></div>
    <div class="bubble" style="left:60%; animation-duration:32s; width:70px; height:70px;"></div>
    <div class="bubble" style="left:75%; animation-duration:26s; width:42px; height:42px;"></div>
    <div class="bubble" style="left:90%; animation-duration:34s; width:55px; height:55px;"></div>
  </div>

  <!-- CONTENU -->
  <div class="container">

    <div class="brand">
      <strong>STAMINA</strong><br>
      micro-brasserie artisanale<br>
      —
    </div>

    <p class="intro">
      Un outil STAMINA pour explorer le langage de la brasserie.
    </p>

    <h1>Génère ton nom de bière</h1>

    <button onclick="generateName()">Générer</button>

    <div id="result">—</div>
    <div class="separator"></div>

    <div class="footer">
      Un nom, un choix — STAMINA
    </div>

  </div>

  <script>
    function generateName() {
      const abstract = [
        "La Brume","Le Silence","La Lueur","L'Instant",
        "L'Horizon","La Saison","La Matière","La Ligne"
      ];

      const material = [
        ["Le Malt", ["Clair","Mat","Simple","Juste"]],
        ["La Fermentation", ["Lente","Calme","Maîtrisée"]],
        ["Le Houblon", ["Sec","Net","Précis"]],
        ["Le Brassin", ["Lent","Soigné"]],
        ["La Capsule", ["Sobre","Claire"]],
        ["La Cuve", ["Ouverte","Stabilisée"]]
      ];

      const editions = ["— Série Courte","— Variation","— Lot Unique"];

      let name = "";
      const roll = Math.random();

      if (roll < 0.45) {
        name = abstract[Math.floor(Math.random() * abstract.length)];
      } else if (roll < 0.85) {
        const base = material[Math.floor(Math.random() * material.length)];
        const adjective = base[1][Math.floor(Math.random() * base[1].length)];
        name = base[0] + " " + adjective;
      } else {
        const base = abstract[Math.floor(Math.random() * abstract.length)];
        const edition = editions[Math.floor(Math.random() * editions.length)];
        name = base + " " + edition;
      }

      document.getElementById("result").textContent = name;
    }
  </script>

</body>
</html>
