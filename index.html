<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>STAMINA — Générateur de nom de bière</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Helvetica, Arial, sans-serif;
      background-color: #fafaf7;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 440px;
      padding: 32px;
    }

    .brand {
  font-size: 13px;
  color: #7a5c3e;
  margin-bottom: 40px;
  line-height: 1.4;
}

   h1 {
  font-size: 30px;
  font-weight: 400;
  line-height: 1.1;
  margin-bottom: 36px;
}

    button {
      background-color: #5e7f68;
      color: #fff;
      border: none;
      padding: 14px 28px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

   #result {
  font-size: 34px;
  font-weight: 500;
  margin-top: 48px;
  letter-spacing: 0.02em;
  transition: opacity 0.2s ease;
}

    .separator {
      width: 40px;
      height: 2px;
      background-color: #e2b74b;
      margin: 12px auto 32px;
    }

    .footer {
      font-size: 12px;
      color: #7a5c3e;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="brand">
    <strong>STAMINA</strong><br>
    micro-brasserie artisanale
  </div>

  <h1>
    Génère<br>
    ton nom<br>
    de bière
  </h1>

  <button onclick="generateName()">Générer</button>

  <div id="result">—</div>
  <div class="separator"></div>

  <div class="footer">
    Une création de STAMINA, micro-brasserie artisanale.
  </div>

</div>

<script>
function generateName() {

  // 1️⃣ NOMS ABSTRAITS FORTS
const abstract = [
  "La Brume",
  "Le Silence",
  "La Lueur",
  "L’Instant",
  "L’Horizon",
  "La Saison",
  "La Matière",
  "La Ligne"
];

  // 2️⃣ STRUCTURES MATIÈRE (nom + adjectif cohérent)
  const material = [
  ["Le Malt", ["Clair", "Mat", "Simple", "Juste"]],
  ["La Fermentation", ["Lente", "Calme", "Maîtrisée"]],
  ["Le Houblon", ["Sec", "Net", "Précis"]],
  ["Le Brassin", ["Lent", "Soigné"]],
  ["La Capsule", ["Sobre", "Claire"]],
  ["La Cuve", ["Ouverte", "Stabilisée"]]
];

  // 3️⃣ STRUCTURES TEMPS / SENSATION
  const temporal = [
  "Temps Lent",
  "Juste Mesure",
  "Saison Courte",
  "Équilibre",
  "Point d’Arrêt"
];

  // 4️⃣ VARIANTES / ÉDITIONS
 const editions = [
  "— Série Courte",
  "— Variation",
  "— Lot Unique"
];

  let name = "";
  const roll = Math.random();

  // STRUCTURE A — Nom abstrait seul
  if (roll < 0.4) {
    name = abstract[Math.floor(Math.random() * abstract.length)];
  }

  // STRUCTURE B — Matière + adjectif
  else if (roll < 0.75) {
    const base = material[Math.floor(Math.random() * material.length)];
    const adjective = base[1][Math.floor(Math.random() * base[1].length)];
    name = base[0] + " " + adjective;
  }

  // STRUCTURE C — Abstrait + variation
  else if (roll < 0.9) {
    const base = abstract[Math.floor(Math.random() * abstract.length)];
    const edition = editions[Math.floor(Math.random() * editions.length)];
    name = base + " " + edition;
  }

  // STRUCTURE D — Nom manifeste très rare
  else {
    name = temporal[Math.floor(Math.random() * temporal.length)];
  }

  document.getElementById("result").textContent = name;
}
</script>

</body>
</html>
