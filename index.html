<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Bricole Brassicole — Générateur de nom de bière</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ GOOGLE FONT (CORRECT) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.6s ease, color 0.6s ease;
    }

    /* ===== SWITCH ===== */
    .theme-switch {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }

    .switch {
      width: 42px;
      height: 22px;
      background: #ccc;
      border-radius: 22px;
      position: relative;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s ease;
    }

    body.theme-night .switch {
      background: #c8923a;
    }

    body.theme-night .switch::after {
      transform: translateX(20px);
    }

    /* ===== BULLES ===== */
    .bubbles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .bubble {
      position: absolute;
      bottom: -200px;
      border-radius: 50%;
      animation: rise linear infinite;
    }

    @keyframes rise {
      from { transform: translate(0,0) scale(0.9); }
      to   { transform: translate(var(--drift), -140vh) scale(1.1); }
    }

    .bubbles.boost .bubble {
      animation-duration: calc(var(--duration) * 0.6);
    }

    /* ===== CARTE ===== */
    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 560px;
      width: 100%;
      padding: 72px 56px;
      border-radius: 18px;
      backdrop-filter: blur(10px);
    }

    .brand {
      font-size: 13px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .intro {
      font-size: 14px;
      max-width: 420px;
      margin: 0 auto 32px auto;
      line-height: 1.6;
    }

    h1 {
      font-size: 36px;
      font-weight: 600;
      margin: 0 0 40px;
      white-space: nowrap;
    }

    button {
      border: none;
      padding: 16px 46px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
    }

    #result {
      font-size: 40px;
      margin-top: 64px;
      letter-spacing: 0.05em;
    }

    .separator {
      width: 52px;
      height: 3px;
      margin: 18px auto 38px;
    }

    .footer {
      font-size: 12px;
      margin-top: 48px;
    }

    /* ===== JOUR ===== */
    body.theme-day {
      color: #1f1f1f;
      background: linear-gradient(180deg,#f5f1e6,#e8d8a8,#c7d7c5);
      background-size: 100% 300%;
      animation: bgDay 50s ease-in-out infinite;
    }

    body.theme-day .container { background: rgba(255,255,255,0.65); }
    body.theme-day button { background: #4f6f5a; color: #fff; }
    body.theme-day .separator { background: #d9a93a; }
    body.theme-day .bubble {
      background: radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(255,255,255,0.2) 60%,rgba(255,255,255,0.05));
    }

    /* ===== SOIR ===== */
    body.theme-night {
      color: #f2efe9;
      background: linear-gradient(180deg,#1b1a17,#2a241b,#3a2f1d);
      background-size: 100% 300%;
      animation: bgNight 60s ease-in-out infinite;
    }

    body.theme-night .container { background: rgba(25,23,18,0.72); }
    body.theme-night button { background: #c8923a; color: #1b1a17; }
    body.theme-night .separator { background: #d9a93a; }
    body.theme-night .bubble {
      background: radial-gradient(circle at 30% 30%,rgba(255,220,150,0.9),rgba(210,150,60,0.35) 60%,rgba(120,70,20,0.15));
    }
  </style>
</head>

<body class="theme-day">

  <div class="theme-switch" onclick="toggleTheme()">
    Jour <div class="switch"></div> Soir
  </div>

  <div class="bubbles" id="bubbles">
    <div class="bubble" style="left:15%;width:40px;height:40px;--duration:30s;--drift:-30px;animation-duration:30s"></div>
    <div class="bubble" style="left:45%;width:70px;height:70px;--duration:46s;--drift:50px;animation-duration:46s"></div>
    <div class="bubble" style="left:75%;width:50px;height:50px;--duration:38s;--drift:-40px;animation-duration:38s"></div>
  </div>

  <div class="container">
    <div class="brand">
      <strong>Bricole Brassicole</strong><br>
      micro‑brasserie artisanale<br>
      —
    </div>

    <p class="intro">
      Un outil Bricole Brassicole pour explorer le langage de la brasserie.
    </p>

    <h1>Génère ton nom de bière</h1>

    <button onclick="generateName()">Générer</button>

    <div id="result">—</div>
    <div class="separator"></div>

    <div class="footer">
      Un nom, un choix — Bricole Brassicole
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.body.classList.toggle("theme-night");
      document.body.classList.toggle("theme-day");
    }

    /* ===== BASES AVEC GENRE ===== */
    const bases = [
      { article: "La", word: "Brume" },
      { article: "Le", word: "Silence" },
      { article: "Le", word: "Malt" },
      { article: "Le", word: "Houblon" },
      { article: "La", word: "Fermentation" },
      { article: "Le", word: "Brassin" },
      { article: "La", word: "Cuve" },
      { article: "La", word: "Levure" },
      { article: "La", word: "Matière" },
      { article: "La", word: "Saison" },
      { article: "Le", word: "Grain" },
      { article: "La", word: "Lueur" }
    ];

    const qualifiers = [
      "Clair","Sombre","Lent","Vif","Calme","Brut","Précis",
      "Doux","Mat","Sec","Juste","Libre","Sauvage","Franc"
    ];

    const suffixes = [
      "", "", "",
      "de Saison",
      "du Soir",
      "— Série Courte",
      "— Lot Unique"
    ];

    let lastName = null;
    const recentNames = [];

    function generateName() {
      let name;
      let tries = 0;

      do {
        const base = bases[Math.floor(Math.random() * bases.length)];
        const qualifier = qualifiers[Math.floor(Math.random() * qualifiers.length)];
        const suffix = suffixes[Math.floor(Math.random() * suffixes.length)];

        name = `${base.article} ${base.word} ${qualifier} ${suffix}`.replace(/\s+/g, " ").trim();
        tries++;
      } while ((name === lastName || recentNames.includes(name)) && tries < 50);

      lastName = name;
      recentNames.push(name);
      if (recentNames.length > 20) recentNames.shift();

      document.getElementById("result").textContent = name;

      const bubbles = document.getElementById("bubbles");
      bubbles.classList.add("boost");
      setTimeout(() => bubbles.classList.remove("boost"), 900);
    }
  </script>

</body>
</html>
