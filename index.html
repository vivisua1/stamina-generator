<script>
function generateName() {

  // STRUCTURE A — Noms abstraits seuls (forte identité)
  const abstractNouns = [
    { article: "La", word: "Brume" },
    { article: "Le", word: "Silence" },
    { article: "La", word: "Lueur" },
    { article: "L’", word: "Instant" },
    { article: "L’", word: "Horizon" },
    { article: "La", word: "Saison" }
  ];

  // STRUCTURE B — Noms bière + adjectifs autorisés
  const beerNouns = [
    {
      article: "Le",
      word: "Malt",
      adjectives: ["Clair", "Mat", "Pur", "Simple"]
    },
    {
      article: "La",
      word: "Fermentation",
      adjectives: ["Lente", "Calme", "Brute"]
    },
    {
      article: "Le",
      word: "Houblon",
      adjectives: ["Brut", "Vif", "Libre"]
    },
    {
      article: "Le",
      word: "Brassin",
      adjectives: ["Simple", "Lent"]
    },
    {
      article: "La",
      word: "Capsule",
      adjectives: ["Pure", "Claire"]
    }
  ];

  let name = "";

  // Tirage de la structure
  if (Math.random() < 0.5) {
    // STRUCTURE A
    const picked =
      abstractNouns[Math.floor(Math.random() * abstractNouns.length)];
    name = picked.article + " " + picked.word;

  } else {
    // STRUCTURE B
    const beer =
      beerNouns[Math.floor(Math.random() * beerNouns.length)];
    const adjective =
      beer.adjectives[Math.floor(Math.random() * beer.adjectives.length)];

    name = beer.article + " " + beer.word + " " + adjective;
  }

  document.getElementById("result").textContent = name;
}
</script>
