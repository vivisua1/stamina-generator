<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>STAMINA — Générateur de nom de bière</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ===============================
       FOND CONTRASTÉ ANIMÉ
       =============================== */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', Helvetica, Arial, sans-serif;
      color: #222;
      min-height: 100vh;
      overflow: hidden;

      background: linear-gradient(
        180deg,
        #f9f6ef 0%,
        #efe6c8 45%,
        #dfe8da 100%
      );
      background-size: 100% 300%;
      animation: slowBackground 60s ease-in-out infinite;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes slowBackground {
      0% { background-position: 50% 0%; }
      50% { background-position: 50% 100%; }
      100% { background-position: 50% 0%; }
    }

    /* ===============================
       BULLES (ARRIÈRE-PLAN)
       =============================== */
    .bubbles {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      bottom: -150px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.35);
      animation: rise linear infinite;
    }

    @keyframes rise {
      from {
        transform: translateY(0);
        opacity: 0;
      }
      10% { opacity: 0.4; }
      to {
        transform: translateY(-120vh);
        opacity: 0;
      }
    }

    /* ===============================
       CARTE CENTRALE
       =============================== */
    .container {
      position: relative;
      z-index: 2;

      background-color: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(6px);

      text-align: center;
      max-width: 520px;
      width: 100%;
      padding: 64px 48px;

      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.06);
    }

    .brand {
      font-size: 13px;
      color: #6f5a3c;
      line-height: 1.5;
      margin-bottom: 40px;
    }

    .intro {
      font-size: 14px;
      color: #444;
      max-width: 420px;
      margin: 0 auto 32px auto;
      line-height: 1.6;
    }

    /* ===== TITRE SUR UNE SEULE LIGNE ===== */
    h1 {
      font-size: 32px;
      font-weight: 600;
      line-height: 1.2;
      margin: 0 0 40px 0;
      white-space: nowrap;
      text-align: center;
    }

    button {
      background-color: #5e7f68;
      color: #fff;
      border: none;
      padding: 14px 40px;
      font-size: 15px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
    }

    #result {
      font-size: 36px;
      font-weight: 600;
      margin-top: 56px;
      letter-spacing: 0.03em;
    }

    .separator {
      width: 40px;
      height: 2px;
      background-color: #e0b84f;
      margin: 14px auto 32px;
    }

    .footer {
      font-size: 11px;
      color: #6f5a3c;
      margin-top: 48px;
    }

    @media (min-width: 768px) {
      h1 {
        font-size: 36px;
      }
      #result {
        font-size: 40px;
      }
    }
  </style>
</head>

<body>

  <!-- BULLES -->
  <div class="bubbles">
    <div class="bubble" style="left:8%;  width:18px; height:18px; animation-duration:18s;"></div>
    <div class="bubble" style="left:22%; width:30px; height:30px; animation-duration:26s;"></div>
    <div class="bubble" style="left:40%; width:14px; height:14px; animation-duration:16s;"></div>
    <div class="bubble" style="left:55%; width:36px; height:36px; animation-duration:32s;"></div>
    <div class="bubble" style="left:70%; width:20px; height:20px; animation-duration:22s;"></div>
    <div class="bubble" style="left:85%; width:28px; height:28px; animation-duration:28s;"></div>
  </div>

  <!-- CONTENU -->
  <div class="container">

    <div class="brand">
      <strong>STAMINA</strong><br>
      micro-brasserie artisanale<br>
      —
    </div>

    <p class="intro">
      Un outil STAMINA pour explorer le langage de la brasserie.
    </p>

    <h1>Génère ton nom de bière</h1>

    <button onclick="generateName()">Générer</button>

    <div id="result">—</div>
    <div class="separator"></div>

    <div class="footer">
      Un nom, un choix — STAMINA
    </div>

  </div>

  <script>
    function generateName() {
      const abstract = [
        "La Brume","Le Silence","La Lueur","L'Instant",
        "L'Horizon","La Saison","La Matière","La Ligne"
      ];

      const material = [
        ["Le Malt", ["Clair","Mat","Simple","Juste"]],
        ["La Fermentation", ["Lente","Calme","Maîtrisée"]],
        ["Le Houblon", ["Sec","Net","Précis"]],
        ["Le Brassin", ["Lent","Soigné"]],
        ["La Capsule", ["Sobre","Claire"]],
        ["La Cuve", ["Ouverte","Stabilisée"]]
      ];

      const editions = ["— Série Courte","— Variation","— Lot Unique"];

      let name = "";
      const roll = Math.random();

      if (roll < 0.45) {
        name = abstract[Math.floor(Math.random() * abstract.length)];
      } else if (roll < 0.85) {
        const base = material[Math.floor(Math.random() * material.length)];
        const adjective = base[1][Math.floor(Math.random() * base[1].length)];
        name = base[0] + " " + adjective;
      } else {
        const base = abstract[Math.floor(Math.random() * abstract.length)];
        const edition = editions[Math.floor(Math.random() * editions.length)];
        name = base + " " + edition;
      }

      document.getElementById("result").textContent = name;
    }
  </script>

</body>
</html>
